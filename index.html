<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AoC 2024 — Day 2</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 640px; }
    h1 { font-size: 22px; font-weight: 600; color: #4ade80; margin-bottom: 4px; }
    p.subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
    textarea { width: 100%; height: 150px; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
    .buttons { display: flex; gap: 10px; margin: 12px 0; }
    button { padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #4ade80; color: #0f172a; }
    .btn-secondary { background: #38bdf8; color: #0f172a; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
    .stat-card { background: #1e293b; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-card .number { font-size: 36px; font-weight: 600; }
    .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .safe-num { color: #4ade80; }
    .unsafe-num { color: #f87171; }
    .report-list { background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; margin-top: 8px; }
    .report-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; font-family: monospace; font-size: 13px; border-bottom: 1px solid #0f172a; }
    .report-row:last-child { border-bottom: none; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; }
    .badge-safe { background: #166534; color: #4ade80; }
    .badge-unsafe { background: #7f1d1d; color: #f87171; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const EXAMPLE = `7 6 4 2 1
1 2 7 8 9
9 7 6 2 1
1 3 2 4 5
8 6 4 4 1
1 3 6 7 9`;

    const isSafe = (levels) => {
      const diffs = levels.slice(1).map((n, i) => n - levels[i]);
      return diffs.every(d => d >= 1 && d <= 3) || diffs.every(d => d >= -3 && d <= -1);
    };

    const isSafeWithDampener = (levels) => {
      if (isSafe(levels)) return true;
      return levels.some((_, i) => {
        const copy = [...levels];
        copy.splice(i, 1);
        return isSafe(copy);
      });
    };

    const parseInput = (raw) =>
      raw.trim().split("\n").filter(l => l.trim()).map(l => l.trim().split(/\s+/).map(Number));

    function App() {
      const [input, setInput] = useState(EXAMPLE);
      const [results, setResults] = useState(null);
      const [mode, setMode] = useState("");

      const solve = (useDampener) => {
        const reports = parseInput(input);
        const check = useDampener ? isSafeWithDampener : isSafe;
        setResults(reports.map(r => ({ levels: r, safe: check(r) })));
        setMode(useDampener ? "Part 2 — Problem Dampener" : "Part 1 — Strict");
      };

      const safeCount = results?.filter(r => r.safe).length ?? 0;
      const unsafeCount = (results?.length ?? 0) - safeCount;

      return (
        <div className="container">
          <h1>AoC 2024 — Day 2</h1>
          <p className="subtitle">Red-Nosed Reports — paste your puzzle input below</p>

          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="Paste puzzle input here..."
          />

          <div className="buttons">
            <button className="btn-primary" onClick={() => solve(false)}>Part 1 — Strict</button>
            <button className="btn-secondary" onClick={() => solve(true)}>Part 2 — Dampener</button>
          </div>

          {results && (
            <>
              <p style={{fontSize: 13, color: "#94a3b8", marginBottom: 10}}>
                {mode} — {results.length} reports analyzed
              </p>
              <div className="stats">
                <div className="stat-card">
                  <div className="number safe-num">{safeCount}</div>
                  <div className="label">Safe reports</div>
                </div>
                <div className="stat-card">
                  <div className="number unsafe-num">{unsafeCount}</div>
                  <div className="label">Unsafe reports</div>
                </div>
              </div>
              <div className="report-list">
                {results.map((r, i) => (
                  <div className="report-row" key={i}>
                    <span>{r.levels.join(" ")}</span>
                    <span className={`badge ${r.safe ? "badge-safe" : "badge-unsafe"}`}>
                      {r.safe ? "safe" : "unsafe"}
                    </span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
